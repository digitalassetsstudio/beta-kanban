<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Project Rooms — Multi-Agent Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        dark: { 950:'#06060a', 900:'#0a0a0f', 800:'#12121a', 700:'#1a1a2e', 600:'#22223a', 500:'#2a2a44' },
        neon: { cyan:'#00f0ff', purple:'#a855f7', pink:'#f472b6', green:'#22c55e', yellow:'#eab308', red:'#ef4444', teal:'#14b8a6', orange:'#f97316' }
      }
    }
  }
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{font-family:'Inter',sans-serif;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{background:#06060a;color:#e2e8f0;margin:0;padding:0;height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#00f0ff22;border-radius:2px}

/* Slide animations */
.sidebar-left{transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-left.open{transform:translateX(0)}
.slide-up{transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.slide-up.open{transform:translateY(0)}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Message bubble tails */
.bubble-user{border-radius:18px 18px 4px 18px}
.bubble-agent{border-radius:18px 18px 18px 4px}

/* Pulse for active agents */
.pulse-ring{animation:pulseRing 2s infinite}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(0,240,255,.4)}70%{box-shadow:0 0 0 6px rgba(0,240,255,0)}100%{box-shadow:0 0 0 0 rgba(0,240,255,0)}}

/* Typing dots */
.typing-dots span{animation:bounce 1.4s infinite;display:inline-block}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* Mention highlight */
.mention{font-weight:600;border-radius:4px;padding:1px 5px;display:inline}

/* Safe area */
.safe-bottom{padding-bottom:env(safe-area-inset-bottom,16px)}
.safe-top{padding-top:env(safe-area-inset-top,0px)}

/* Mic recording pulse */
.mic-active{animation:micPulse 1s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}

/* Image preview */
.img-preview{max-width:200px;max-height:200px;border-radius:12px;border:1px solid rgba(255,255,255,.1)}

/* Task embed card */
.task-embed{border-left:3px solid;border-radius:0 8px 8px 0}
</style>
</head>
<body>

<!-- ═══════════════ MAIN CHAT VIEW ═══════════════ -->
<div id="app" class="flex flex-col h-full">

  <!-- TOP BAR -->
  <header class="safe-top flex items-center justify-between px-4 py-3 bg-dark-900/90 backdrop-blur-xl border-b border-white/5 z-30">
    <button onclick="toggleSidebar()" class="w-9 h-9 rounded-xl bg-white/5 flex items-center justify-center text-gray-400 hover:text-neon-cyan transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 rounded-full bg-neon-green pulse-ring"></div>
      <span id="roomTitle" class="text-sm font-semibold text-white">Project Rooms</span>
    </div>
    <button onclick="toggleAgentPanel()" class="w-9 h-9 rounded-xl bg-white/5 flex items-center justify-center text-gray-400 hover:text-neon-purple transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </button>
  </header>

  <!-- MESSAGES AREA -->
  <div id="messagesArea" class="flex-1 overflow-y-auto px-4 py-3 space-y-3"></div>

  <!-- INPUT BAR -->
  <div class="safe-bottom bg-dark-900/90 backdrop-blur-xl border-t border-white/5 px-3 py-2">
    <!-- Image preview strip -->
    <div id="imagePreview" class="hidden mb-2 flex gap-2"></div>

    <div class="flex items-end gap-2">
      <!-- Camera -->
      <button onclick="document.getElementById('cameraInput').click()" class="w-9 h-9 rounded-xl bg-white/5 flex items-center justify-center text-gray-400 hover:text-neon-purple transition flex-shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </button>
      <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden" onchange="handleImageUpload(event)">

      <!-- Text input -->
      <div class="flex-1 relative">
        <div id="mentionDropdown" class="hidden absolute bottom-full left-0 right-0 mb-1 bg-dark-700 border border-white/10 rounded-xl overflow-hidden z-20 shadow-2xl"></div>
        <textarea id="chatInput" rows="1" placeholder="Message… @ to mention agents" class="w-full px-4 py-2.5 rounded-2xl bg-dark-800 border border-white/10 text-white text-sm placeholder-gray-600 focus:border-neon-cyan/40 focus:outline-none resize-none max-h-28 leading-snug" oninput="handleInputChange()" onkeydown="handleKeyDown(event)"></textarea>
      </div>

      <!-- Mic -->
      <button id="micBtn" onclick="toggleMic()" class="w-9 h-9 rounded-xl bg-white/5 flex items-center justify-center text-gray-400 hover:text-neon-red transition flex-shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
      </button>

      <!-- Send -->
      <button onclick="sendMessage()" class="w-9 h-9 rounded-xl bg-neon-cyan/15 border border-neon-cyan/30 flex items-center justify-center text-neon-cyan hover:bg-neon-cyan/25 transition flex-shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════ PROJECT SIDEBAR (LEFT) ═══════════════ -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleSidebar()"></div>
<div id="projectSidebar" class="sidebar-left fixed top-0 left-0 h-full w-[85%] max-w-[340px] bg-dark-900 border-r border-white/10 z-50 flex flex-col safe-top">
  <div class="p-5 border-b border-white/5">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-neon-cyan to-neon-purple flex items-center justify-center font-bold text-dark-900 text-lg">R</div>
      <div>
        <h1 class="text-base font-bold text-white">Project Rooms</h1>
        <p class="text-[11px] text-gray-500">Multi-Agent Workspace</p>
      </div>
    </div>
    <button onclick="toggleSidebar()" class="absolute top-4 right-4 w-8 h-8 rounded-lg bg-white/5 text-gray-400 flex items-center justify-center text-sm">✕</button>
  </div>
  <div id="projectList" class="flex-1 overflow-y-auto py-2"></div>
  <div class="p-4 border-t border-white/5">
    <div class="flex items-center gap-2 text-[11px] text-gray-600">
      <div class="w-2 h-2 rounded-full bg-neon-green"></div>
      <span>Tailscale secured</span>
      <span class="mx-1">·</span>
      <span id="deviceCount">5 agents online</span>
    </div>
  </div>
</div>

<!-- ═══════════════ AGENT PROFILE PANEL (BOTTOM) ═══════════════ -->
<div id="agentPanelOverlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleAgentPanel()"></div>
<div id="agentPanel" class="slide-up fixed bottom-0 left-0 right-0 bg-dark-900 border-t border-white/10 z-50 rounded-t-3xl safe-bottom" style="max-height:70dvh">
  <div class="flex justify-center pt-3 pb-1">
    <div class="w-10 h-1 rounded-full bg-white/20"></div>
  </div>
  <div class="px-5 pb-2">
    <h2 class="text-sm font-bold text-white">Agent Team</h2>
    <p class="text-[11px] text-gray-500">Tap to view profile · Mention with @</p>
  </div>
  <div id="agentList" class="overflow-y-auto px-5 pb-5 space-y-2" style="max-height:55dvh"></div>
</div>

<!-- ═══════════════ AGENT PROFILE DETAIL (FULL MODAL) ═══════════════ -->
<div id="agentDetailOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden" onclick="closeAgentDetail()"></div>
<div id="agentDetail" class="fixed inset-x-0 bottom-0 bg-dark-800 border-t border-white/10 z-50 rounded-t-3xl hidden safe-bottom" style="max-height:85dvh">
  <div class="flex justify-center pt-3 pb-1"><div class="w-10 h-1 rounded-full bg-white/20"></div></div>
  <div id="agentDetailContent" class="overflow-y-auto px-5 pb-8" style="max-height:80dvh"></div>
</div>

<script>
// ════════════════════════════════════════
// DATA
// ════════════════════════════════════════
const AGENTS = {
  shisat: { id:'shisat', name:'Shisat', role:'Analytics Architect', emoji:'📊', color:'#a855f7', colorClass:'text-purple-400', bgClass:'bg-purple-500/10', borderClass:'border-purple-500/30', status:'active', lastSeen:'1m ago',
    desc:'Real-time data pipeline architect. Monitors event streams, detects anomalies, and optimizes query performance across the analytics platform.',
    skills:['Kafka','Flink','ClickHouse','Grafana','Anomaly Detection'],
    currentTask:'Streaming 2.4M events/min through the new Kafka pipeline — p99 latency down to 12ms' },
  aset:   { id:'aset', name:'Aset', role:'Knowledge Keeper', emoji:'🗝️', color:'#14b8a6', colorClass:'text-teal-400', bgClass:'bg-teal-500/10', borderClass:'border-teal-500/30', status:'active', lastSeen:'3m ago',
    desc:'Manages the knowledge base, documentation, and context memory. Ensures every agent has access to the right information at the right time.',
    skills:['RAG','Embeddings','Neo4j','Full-text Search','Context Windows'],
    currentTask:'Indexing 1,847 new documents into the vector store — retrieval accuracy at 96.3%' },
  heru:   { id:'heru', name:'Heru', role:'Execution Commander', emoji:'⚔️', color:'#f97316', colorClass:'text-orange-400', bgClass:'bg-orange-500/10', borderClass:'border-orange-500/30', status:'active', lastSeen:'30s ago',
    desc:'Orchestrates task execution and coordinates multi-agent workflows. Breaks down complex objectives into actionable steps and tracks completion.',
    skills:['Task Decomposition','Workflow Orchestration','Dependency Resolution','Scheduling'],
    currentTask:'Coordinating 3 parallel workflows across LegitCheck, SciTrades, and Ptah Evolution' },
  montu:  { id:'montu', name:'Montu', role:'Guardian Sentinel', emoji:'🛡️', color:'#22c55e', colorClass:'text-green-400', bgClass:'bg-green-500/10', borderClass:'border-green-500/30', status:'idle', lastSeen:'8m ago',
    desc:'Security and compliance guardian. Monitors for threats, enforces access policies, and ensures all operations meet regulatory requirements.',
    skills:['SAST/DAST','SOC2','OWASP','Threat Modeling','Compliance Automation'],
    currentTask:'Scanning Ptah Evolution plugin API for sandbox escape vectors — 0 critical findings so far' },
  anubis: { id:'anubis', name:'Anubis', role:'Transition Guide', emoji:'🔮', color:'#eab308', colorClass:'text-yellow-400', bgClass:'bg-yellow-500/10', borderClass:'border-yellow-500/30', status:'active', lastSeen:'5m ago',
    desc:'Manages deployments, migrations, and transitions between system states. Ensures smooth rollouts and zero-downtime upgrades.',
    skills:['CI/CD','Blue-Green Deploy','Database Migration','Feature Flags','Rollback'],
    currentTask:'Preparing blue-green deployment for Shisat v2.4 — target: zero-downtime cutover' }
};

const PROJECTS = [
  { id:'p1', name:'LegitCheck', emoji:'🛡️', agents:['heru','montu'], unread:2, lastMsg:'Heru: Schema migration complete ✅' },
  { id:'p2', name:'AI Ally Fork', emoji:'🧠', agents:['shisat','aset'], unread:0, lastMsg:'Aset: Knowledge base synced' },
  { id:'p3', name:'SciTrades', emoji:'📈', agents:['shisat','heru'], unread:5, lastMsg:'Shisat: Alpha signal detected on ETH/BTC' },
  { id:'p4', name:'My Distant Relative', emoji:'🌉', agents:['aset','anubis'], unread:1, lastMsg:'Anubis: Visa API integration deployed' },
  { id:'p5', name:'AI Quick Wins', emoji:'⚡', agents:['heru','anubis'], unread:0, lastMsg:'Heru: 4 micro-products in pipeline' },
  { id:'p6', name:'AI Auto SaaS', emoji:'🤖', agents:['shisat','heru','montu'], unread:3, lastMsg:'Shisat: Worker completion rate at 94%' },
  { id:'p7', name:'Ptah Evolution', emoji:'🔧', agents:['aset','montu','anubis'], unread:0, lastMsg:'Montu: Plugin sandbox audit clean' },
  { id:'p8', name:'Shisat Upgrade', emoji:'📊', agents:['shisat','aset','anubis'], unread:2, lastMsg:'Anubis: Blue-green prep started' },
];

const TASK_EMBEDS = [
  { id:'t1', title:'Finalize scam database schema', status:'Doing', health:'Green', project:'LegitCheck' },
  { id:'t2', title:'Real-time data pipeline', status:'Doing', health:'Yellow', project:'Shisat Upgrade' },
  { id:'t3', title:'Worker orchestration engine', status:'Doing', health:'Red', project:'AI Auto SaaS' },
  { id:'t4', title:'Plugin API public release', status:'Review', health:'Yellow', project:'Ptah Evolution' },
];

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let currentRoom = PROJECTS[0];
let messages = [];
let isRecording = false;
let recognition = null;
let pendingImages = [];
let mentionTarget = null;

// ════════════════════════════════════════
// INIT MESSAGES
// ════════════════════════════════════════
function initMessages() {
  messages = [
    { type:'system', text:'Room created — LegitCheck project workspace', time:'9:00 AM' },
    { type:'system', text:'🛡️ Montu connected via Tailscale (macbook-ptah)', time:'9:01 AM', icon:'🔗' },
    { agent:'heru', text:'Good morning. I\'ve broken down the LegitCheck launch into 3 parallel workstreams. The scam DB schema, PWA sync engine, and barcode module can all move independently.', time:'9:02 AM' },
    { agent:'montu', text:'Ran a security audit on the barcode scanning module this morning. Clean — no injection vectors in the QR parsing pipeline. Approved for Review → Done.', time:'9:05 AM' },
    { type:'task', task:TASK_EMBEDS[0], time:'9:08 AM' },
    { agent:'heru', text:'@Montu can you also check the offline sync engine? There are conflict resolution edge cases when field agents push from low-connectivity zones.', time:'9:12 AM' },
    { user:true, text:'What\'s the current blocker status on the load testing task?', time:'9:15 AM' },
    { agent:'montu', text:'The 10k concurrent load test is blocked — our staging environment maxes out at 4k connections. I\'ve flagged this as High risk. We need infra to provision a larger instance.', time:'9:17 AM' },
    { type:'system', text:'📷 Heru shared a screenshot from Tailscale relay (macbook-ptah)', time:'9:20 AM', icon:'📷' },
    { agent:'heru', text:'Here\'s the current architecture diagram. @Anubis can you prep the blue-green deployment config for the staging scale-up?', time:'9:21 AM' },
    { agent:'anubis', text:'On it. I\'ll have the deployment config ready by EOD. Target: zero-downtime scale from 4k → 10k concurrent capacity.', time:'9:25 AM' },
    { type:'relay', text:'Anubis joined from iPhone (Tailscale)', time:'9:25 AM' },
  ];
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function renderMessages() {
  const area = document.getElementById('messagesArea');
  area.innerHTML = messages.map((m, i) => {
    if (m.type === 'system') return renderSystem(m);
    if (m.type === 'task') return renderTaskEmbed(m);
    if (m.type === 'relay') return renderRelay(m);
    if (m.user) return renderUserMsg(m);
    return renderAgentMsg(m);
  }).join('');

  // Add typing indicator for active room
  area.innerHTML += `<div id="typingIndicator" class="hidden fade-in">
    <div class="flex items-end gap-2 max-w-[85%]">
      <div class="w-7 h-7 rounded-full bg-purple-500/20 flex items-center justify-center text-xs flex-shrink-0">📊</div>
      <div class="px-4 py-2.5 rounded-2xl bg-dark-700/60 border border-white/5 text-xs text-gray-400">
        <span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
  </div>`;

  area.scrollTop = area.scrollHeight;
}

function renderSystem(m) {
  return `<div class="flex justify-center fade-in">
    <div class="px-3 py-1.5 rounded-full bg-white/5 text-[11px] text-gray-500 flex items-center gap-1.5">
      ${m.icon ? `<span>${m.icon}</span>` : ''}
      <span>${m.text}</span>
      <span class="text-gray-700 ml-1">${m.time}</span>
    </div>
  </div>`;
}

function renderRelay(m) {
  return `<div class="flex justify-center fade-in">
    <div class="px-3 py-1.5 rounded-full bg-neon-cyan/5 border border-neon-cyan/10 text-[11px] text-neon-cyan/70 flex items-center gap-1.5">
      <span>🔗</span><span>${m.text}</span><span class="text-neon-cyan/30 ml-1">${m.time}</span>
    </div>
  </div>`;
}

function renderTaskEmbed(m) {
  const t = m.task;
  const hc = t.health==='Green'?'#22c55e':t.health==='Yellow'?'#eab308':'#ef4444';
  const sc = t.status==='Doing'?'#f59e0b':t.status==='Review'?'#a855f7':'#22c55e';
  return `<div class="fade-in my-1">
    <div class="task-embed bg-dark-700/40 p-3 rounded-xl" style="border-left-color:${sc}">
      <div class="flex items-center justify-between mb-1">
        <span class="text-[10px] font-medium px-1.5 py-0.5 rounded" style="color:${sc};background:${sc}15;border:1px solid ${sc}33">${t.status}</span>
        <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full" style="background:${hc}"></div><span class="text-[10px] text-gray-500">${t.health}</span></div>
      </div>
      <div class="text-xs font-semibold text-gray-200 mb-0.5">${t.title}</div>
      <div class="text-[10px] text-gray-500">${t.project}</div>
    </div>
  </div>`;
}

function renderUserMsg(m) {
  return `<div class="flex justify-end fade-in">
    <div class="max-w-[82%]">
      <div class="bubble-user px-4 py-2.5 bg-neon-cyan/10 border border-neon-cyan/20 text-[13px] text-gray-100 leading-relaxed">${linkifyMentions(m.text)}</div>
      <div class="text-[10px] text-gray-600 text-right mt-0.5 mr-1">${m.time}</div>
    </div>
  </div>`;
}

function renderAgentMsg(m) {
  const a = AGENTS[m.agent];
  if (!a) return '';
  return `<div class="flex items-end gap-2 max-w-[85%] fade-in">
    <button onclick="openAgentDetail('${a.id}')" class="w-7 h-7 rounded-full flex items-center justify-center text-xs flex-shrink-0 hover:scale-110 transition" style="background:${a.color}15;border:1px solid ${a.color}33">${a.emoji}</button>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-1.5 mb-0.5 ml-1">
        <span class="text-[10px] font-semibold" style="color:${a.color}">${a.name}</span>
        <span class="text-[9px] text-gray-600">${a.role}</span>
      </div>
      <div class="bubble-agent px-4 py-2.5 bg-dark-700/60 border border-white/5 text-[13px] text-gray-200 leading-relaxed">${linkifyMentions(m.text)}</div>
      <div class="text-[10px] text-gray-600 mt-0.5 ml-1">${m.time}</div>
    </div>
  </div>`;
}

function linkifyMentions(text) {
  return text.replace(/@(\w+)/g, (match, name) => {
    const a = Object.values(AGENTS).find(ag => ag.name.toLowerCase() === name.toLowerCase());
    if (a) return `<span class="mention" style="color:${a.color};background:${a.color}15">@${a.name}</span>`;
    return match;
  });
}

// ════════════════════════════════════════
// PROJECT SIDEBAR
// ════════════════════════════════════════
function renderProjectList() {
  document.getElementById('projectList').innerHTML = PROJECTS.map(p => {
    const active = p.id === currentRoom.id;
    const agentAvatars = p.agents.map(aid => {
      const a = AGENTS[aid];
      return `<div class="w-5 h-5 rounded-full flex items-center justify-center text-[9px] -ml-1 first:ml-0" style="background:${a.color}20;border:1px solid ${a.color}44">${a.emoji}</div>`;
    }).join('');
    return `<button onclick="switchRoom('${p.id}')" class="w-full px-4 py-3 flex items-center gap-3 transition hover:bg-white/5 ${active ? 'bg-neon-cyan/5 border-r-2 border-neon-cyan' : ''}">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg ${active ? 'bg-neon-cyan/15' : 'bg-white/5'}">${p.emoji}</div>
      <div class="flex-1 text-left min-w-0">
        <div class="flex items-center justify-between">
          <span class="text-sm font-medium ${active ? 'text-white' : 'text-gray-300'} truncate">${p.name}</span>
          ${p.unread > 0 ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-neon-cyan/20 text-neon-cyan ml-2">${p.unread}</span>` : ''}
        </div>
        <div class="flex items-center gap-1 mt-0.5">
          <div class="flex items-center">${agentAvatars}</div>
          <span class="text-[10px] text-gray-600 truncate ml-1">${p.lastMsg}</span>
        </div>
      </div>
    </button>`;
  }).join('');
}

function toggleSidebar() {
  const sb = document.getElementById('projectSidebar');
  const ov = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('hidden');
}

function switchRoom(id) {
  currentRoom = PROJECTS.find(p => p.id === id) || PROJECTS[0];
  document.getElementById('roomTitle').textContent = currentRoom.name;
  PROJECTS.forEach(p => p.unread = p.id === id ? 0 : p.unread);
  initMessages();
  renderMessages();
  renderProjectList();
  toggleSidebar();
}

// ════════════════════════════════════════
// AGENT PANEL
// ════════════════════════════════════════
function renderAgentList() {
  document.getElementById('agentList').innerHTML = Object.values(AGENTS).map(a => {
    const statusDot = a.status === 'active' ? 'bg-neon-green' : 'bg-gray-600';
    return `<button onclick="openAgentDetail('${a.id}')" class="w-full flex items-center gap-3 p-3 rounded-xl bg-dark-800/50 border border-white/5 hover:bg-white/5 transition text-left">
      <div class="relative">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg" style="background:${a.color}15;border:1px solid ${a.color}33">${a.emoji}</div>
        <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full ${statusDot} border-2 border-dark-900"></div>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
          <span class="text-sm font-semibold" style="color:${a.color}">${a.name}</span>
          <span class="text-[9px] px-1.5 py-0.5 rounded-full bg-white/5 text-gray-500">${a.lastSeen}</span>
        </div>
        <div class="text-[11px] text-gray-500 truncate">${a.role}</div>
      </div>
      <span class="text-gray-600 text-lg">@</span>
    </button>`;
  }).join('');
}

function toggleAgentPanel() {
  const p = document.getElementById('agentPanel');
  const ov = document.getElementById('agentPanelOverlay');
  p.classList.toggle('open');
  ov.classList.toggle('hidden');
}

function openAgentDetail(id) {
  const a = AGENTS[id];
  if (!a) return;
  const statusColor = a.status === 'active' ? '#22c55e' : '#6b7280';

  document.getElementById('agentDetailContent').innerHTML = `
    <div class="flex flex-col items-center pt-2 pb-4">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mb-3 relative" style="background:${a.color}15;border:2px solid ${a.color}44">
        ${a.emoji}
        <div class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full border-2 border-dark-800" style="background:${statusColor}"></div>
      </div>
      <h3 class="text-lg font-bold text-white">${a.name}</h3>
      <p class="text-xs text-gray-400">${a.role}</p>
      <p class="text-[11px] mt-1" style="color:${a.color}">${a.status === 'active' ? '● Online' : '○ Idle'} · ${a.lastSeen}</p>
    </div>
    <div class="bg-dark-900/50 rounded-xl p-4 mb-3 border border-white/5">
      <h4 class="text-[10px] uppercase tracking-wider text-gray-500 mb-2">About</h4>
      <p class="text-xs text-gray-300 leading-relaxed">${a.desc}</p>
    </div>
    <div class="bg-dark-900/50 rounded-xl p-4 mb-3 border border-white/5">
      <h4 class="text-[10px] uppercase tracking-wider text-gray-500 mb-2">Current Activity</h4>
      <p class="text-xs text-gray-300 leading-relaxed">${a.currentTask}</p>
    </div>
    <div class="bg-dark-900/50 rounded-xl p-4 mb-3 border border-white/5">
      <h4 class="text-[10px] uppercase tracking-wider text-gray-500 mb-2">Skills</h4>
      <div class="flex flex-wrap gap-1.5">
        ${a.skills.map(s => `<span class="text-[10px] px-2 py-1 rounded-full" style="background:${a.color}10;color:${a.color};border:1px solid ${a.color}25">${s}</span>`).join('')}
      </div>
    </div>
    <button onclick="mentionAgent('${a.name}')" class="w-full py-3 rounded-xl text-sm font-medium transition" style="background:${a.color}15;color:${a.color};border:1px solid ${a.color}30">
      @ ${a.name}
    </button>
  `;

  document.getElementById('agentDetail').classList.remove('hidden');
  document.getElementById('agentDetailOverlay').classList.remove('hidden');
}

function closeAgentDetail() {
  document.getElementById('agentDetail').classList.add('hidden');
  document.getElementById('agentDetailOverlay').classList.add('hidden');
}

function mentionAgent(name) {
  closeAgentDetail();
  const input = document.getElementById('chatInput');
  input.value += `@${name} `;
  input.focus();
}

// ════════════════════════════════════════
// MENTION DROPDOWN
// ════════════════════════════════════════
function handleInputChange() {
  const input = document.getElementById('chatInput');
  // Auto-resize
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 112) + 'px';

  // Mention detection
  const text = input.value;
  const cursorPos = input.selectionStart;
  const beforeCursor = text.slice(0, cursorPos);
  const mentionMatch = beforeCursor.match(/@(\w*)$/);

  if (mentionMatch) {
    mentionTarget = mentionMatch[1].toLowerCase();
    showMentionDropdown(mentionTarget);
  } else {
    mentionTarget = null;
    hideMentionDropdown();
  }
}

function showMentionDropdown(filter) {
  const dd = document.getElementById('mentionDropdown');
  const matches = Object.values(AGENTS).filter(a => !filter || a.name.toLowerCase().startsWith(filter));

  if (matches.length === 0) { hideMentionDropdown(); return; }

  dd.innerHTML = matches.map(a => `
    <button onclick="selectMention('${a.name}')" class="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-white/5 transition text-left">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center text-sm" style="background:${a.color}15;border:1px solid ${a.color}33">${a.emoji}</div>
      <div>
        <span class="text-sm font-medium" style="color:${a.color}">${a.name}</span>
        <span class="text-[10px] text-gray-500 ml-2">${a.role}</span>
      </div>
    </button>
  `).join('');

  dd.classList.remove('hidden');
}

function hideMentionDropdown() {
  document.getElementById('mentionDropdown').classList.add('hidden');
}

function selectMention(name) {
  const input = document.getElementById('chatInput');
  const text = input.value;
  const cursorPos = input.selectionStart;
  const beforeCursor = text.slice(0, cursorPos);
  const afterCursor = text.slice(cursorPos);

  // Replace @partial with @Name
  const newBefore = beforeCursor.replace(/@\w*$/, `@${name} `);
  input.value = newBefore + afterCursor;
  input.focus();
  input.setSelectionRange(newBefore.length, newBefore.length);
  hideMentionDropdown();
  mentionTarget = null;
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ════════════════════════════════════════
// SEND MESSAGE
// ════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text && pendingImages.length === 0) return;

  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

  // Add text message
  if (text) {
    messages.push({ user:true, text, time:timeStr });
  }

  // Add image messages
  pendingImages.forEach(img => {
    messages.push({ user:true, text:`📷 Image shared`, time:timeStr, image:img });
  });

  input.value = '';
  input.style.height = 'auto';
  pendingImages = [];
  document.getElementById('imagePreview').classList.add('hidden');
  document.getElementById('imagePreview').innerHTML = '';
  hideMentionDropdown();
  renderMessages();

  // Simulate agent response
  simulateAgentReply(text);
}

function simulateAgentReply(userText) {
  // Pick a relevant agent
  const mentionedAgent = Object.values(AGENTS).find(a =>
    userText.toLowerCase().includes(`@${a.name.toLowerCase()}`)
  );

  // Find agents in current room
  const roomAgents = currentRoom.agents.map(id => AGENTS[id]).filter(Boolean);
  const responder = mentionedAgent || roomAgents[Math.floor(Math.random() * roomAgents.length)];
  if (!responder) return;

  // Show typing
  setTimeout(() => {
    const indicator = document.getElementById('typingIndicator');
    if (indicator) {
      indicator.classList.remove('hidden');
      indicator.querySelector('.w-7').textContent = responder.emoji;
      indicator.querySelector('.w-7').style.background = responder.color + '20';
    }
    const area = document.getElementById('messagesArea');
    area.scrollTop = area.scrollHeight;
  }, 400);

  // Generate response
  setTimeout(() => {
    const responses = [
      `Understood. I'll factor that into the current ${currentRoom.name} workflow and report back with an update.`,
      `Got it. Cross-referencing with the latest data now — should have specifics within the hour.`,
      `Noted. I can see a path forward on this. Let me verify a few things first and I'll share the plan.`,
      `Good call. I'm already tracking this area closely. Adjusting the approach now.`,
      `On it. I'll coordinate with the team and flag any blockers before they escalate.`,
    ];
    const reply = responses[Math.floor(Math.random() * responses.length)];
    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

    messages.push({ agent:responder.id, text:reply, time:timeStr });
    renderMessages();
  }, 1500 + Math.random() * 1500);
}

// ════════════════════════════════════════
// VOICE INPUT (Web Speech API)
// ════════════════════════════════════════
function toggleMic() {
  if (isRecording) {
    stopMic();
  } else {
    startMic();
  }
}

function startMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Speech recognition not supported in this browser. Try Safari or Chrome.');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isRecording = true;
    const btn = document.getElementById('micBtn');
    btn.classList.add('mic-active', 'bg-red-500/20', 'text-red-400');
    btn.classList.remove('bg-white/5', 'text-gray-400');
  };

  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    document.getElementById('chatInput').value = transcript;
  };

  recognition.onend = () => {
    stopMic();
  };

  recognition.onerror = () => {
    stopMic();
  };

  recognition.start();
}

function stopMic() {
  isRecording = false;
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
  const btn = document.getElementById('micBtn');
  btn.classList.remove('mic-active', 'bg-red-500/20', 'text-red-400');
  btn.classList.add('bg-white/5', 'text-gray-400');
}

// ════════════════════════════════════════
// IMAGE UPLOAD (base64)
// ════════════════════════════════════════
function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    const base64 = ev.target.result;
    pendingImages.push(base64);

    const preview = document.getElementById('imagePreview');
    preview.classList.remove('hidden');
    preview.innerHTML += `
      <div class="relative">
        <img src="${base64}" class="w-16 h-16 rounded-lg object-cover border border-white/10">
        <button onclick="removePendingImage(${pendingImages.length - 1})" class="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-red-500 text-white text-[10px] flex items-center justify-center">✕</button>
      </div>`;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removePendingImage(idx) {
  pendingImages.splice(idx, 1);
  const preview = document.getElementById('imagePreview');
  if (pendingImages.length === 0) {
    preview.classList.add('hidden');
    preview.innerHTML = '';
  } else {
    preview.innerHTML = pendingImages.map((img, i) => `
      <div class="relative">
        <img src="${img}" class="w-16 h-16 rounded-lg object-cover border border-white/10">
        <button onclick="removePendingImage(${i})" class="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-red-500 text-white text-[10px] flex items-center justify-center">✕</button>
      </div>`).join('');
  }
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
initMessages();
renderMessages();
renderProjectList();
renderAgentList();
</script>
