.glow-cyan { box-shadow: 0 0 15px #00f0ff22, 0 0 30px #00f0ff11; }

.dragging { opacity: 0.5; transform: rotate(2deg); }
.side-panel { transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
.side-panel.open { transform: translateX(0); }
.modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-overlay.active { opacity: 1; pointer-events: all; }
.pulse-dot { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.heat-low { background: linear-gradient(135deg, #22c55e33, #22c55e11); border-left: 3px solid #22c55e; }
.heat-med { background: linear-gradient(135deg, #eab30833, #eab30811); border-left: 3px solid #eab308; }
.heat-high { background: linear-gradient(135deg, #ef444433, #ef444411); border-left: 3px solid #ef4444; }
.gantt-bar { height: 28px; border-radius: 6px; position: relative; overflow: hidden; }
.gantt-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%); animation: shimmer 2s infinite; }
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
.column-header { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); }
.progress-ring { transform: rotate(-90deg); }
.typing-dots span { animation: typingBounce 1.4s infinite; display: inline-block; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
.stat-bar { height: 4px; border-radius: 2px; background: #1a1a2e; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
.insight-card { border-left: 2px solid; transition: all 0.2s; }
.insight-card:hover { background: rgba(255,255,255,0.02); }

// ============ HELPERS ============
function getProject(id) { return projects.find(p => p.id === id); }
function getCurrentProject() { return getProject(currentProjectId); }
function getAllTasks() { let all = []; projects.forEach(p => p.tasks.forEach(t => all.push({...t, projectName: p.name, projectId: p.id}))); return all; }
function healthColor(h) { return h==='Green'?'#22c55e':h==='Yellow'?'#eab308':'#ef4444'; }
function healthBg(h) { return h==='Green'?'bg-green-500/10 text-green-400 border-green-500/30':h==='Yellow'?'bg-yellow-500/10 text-yellow-400 border-yellow-500/30':'bg-red-500/10 text-red-400 border-red-500/30'; }
function riskClass(r) { return r==='Low'?'heat-low':r==='Med'?'heat-med':'heat-high'; }

function insightIcon(type) {
  const m = {working:'⚙️',discovery:'💡',idea:'✨',blocker:'🚧',finding:'🔍'};
  return m[type]||'📌';
}
function insightColor(type) {
  const m = {working:'#00f0ff',discovery:'#a855f7',idea:'#22c55e',blocker:'#ef4444',finding:'#f59e0b'};
  return m[type]||'#6b7280';
}

function renderCard(task, projId) {
  const daysLeft = Math.ceil((new Date(task.due) - new Date()) / 86400000);
  const dueLabel = daysLeft < 0 ? `${Math.abs(daysLeft)}d overdue` : daysLeft === 0 ? 'Due today' : `${daysLeft}d left`;
  const dueColor = daysLeft < 0 ? 'text-red-400' : daysLeft <= 3 ? 'text-yellow-400' : 'text-gray-500';
  return `<div class="bg-dark-700/60 border border-white/5 rounded-xl p-3.5 card-hover cursor-grab active:cursor-grabbing ${riskClass(task.risk)}" draggable="true" data-task-id="${task.id}" data-project-id="${projId}" data-column="${task.column}" ondragstart="handleDragStart(event,'${task.id}','${projId}','${task.column}')" ondragend="handleDragEnd(event)" onclick="openSidePanel('${task.id}','${projId}')">
    <div class="flex items-start justify-between mb-2"><h4 class="text-sm font-semibold text-gray-100 leading-tight flex-1 pr-2">${task.title}</h4><div class="w-2.5 h-2.5 rounded-full flex-shrink-0 mt-1 ${task.health==='Green'?'bg-green-500':task.health==='Yellow'?'bg-yellow-500 pulse-dot':'bg-red-500 pulse-dot'}" title="${task.health}"></div></div>
    <p class="text-xs text-gray-500 mb-3 line-clamp-2">${task.desc}</p>
    <div class="flex items-center justify-between"><span class="text-xs ${dueColor}">${dueLabel}</span><div class="flex items-center gap-1.5"><span class="text-[10px] px-1.5 py-0.5 rounded border ${healthBg(task.health)}">${task.health}</span><span class="text-[10px] px-1.5 py-0.5 rounded bg-white/5 text-gray-400 border border-white/10">${task.revenue}</span></div></div>
  </div>`;
}

  const globalStart = new Date('2026-01-01'), globalEnd = new Date('2027-07-01'), totalDays = (globalEnd - globalStart) / 86400000;
  function dtp(s) { return Math.max(0, Math.min(100, ((new Date(s) - globalStart) / 86400000) / totalDays * 100)); }
  document.getElementById('ganttView').innerHTML = `<div class="bg-dark-800/50 border border-white/5 rounded-2xl p-6"><h2 class="text-lg font-bold text-neon-cyan mb-6">Timeline View</h2><div class="relative"><div class="flex mb-4 border-b border-white/5 pb-2">${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'].map(m=>`<div class="flex-1 text-[10px] text-gray-600 text-center">${m}</div>`).join('')}</div>${timelineProjects.map(p=>`<div class="mb-8"><h3 class="text-sm font-bold text-gray-200 mb-3 flex items-center gap-2"><span class="w-3 h-3 rounded" style="background:${p.phases[0].color}"></span>${p.name}</h3><div class="space-y-2">${p.phases.map(ph=>`<div class="flex items-center gap-3"><div class="w-28 text-xs text-gray-400 flex-shrink-0">${ph.name}</div><div class="flex-1 relative h-7"><div class="gantt-bar absolute top-0" style="left:${dtp(ph.start)}%;width:${dtp(ph.end)-dtp(ph.start)}%;background:${ph.color}33;border:1px solid ${ph.color}66;"><div class="absolute inset-0 flex items-center px-2 text-[10px] text-white font-medium truncate">${ph.desc}</div></div></div></div>`).join('')}</div></div>`).join('')}<div class="absolute top-0 bottom-0" style="left:${dtp('2026-05-19')}%;width:2px;background:#00f0ff44;z-index:5;"><div class="absolute -top-1 left-1/2 -translate-x-1/2 text-[9px] text-neon-cyan font-bold bg-dark-800 px-1 rounded">TODAY</div></div></div></div>`;
}

function renderHeatmap() {
  const allTasks = getAllTasks(), riskOrder = ['High','Med','Low'];
  const scoreMap = {}; allTasks.forEach(t => { let s=0; s+=t.risk==='High'?3:t.risk==='Med'?2:1; s+=t.health==='Red'?3:t.health==='Yellow'?2:0; const d=Math.ceil((new Date(t.due)-new Date())/86400000); s+=d<0?4:d<=3?3:d<=7?2:1; s+=t.column==='Done'?0:1; scoreMap[t.id]=s; });
  const top5 = [...allTasks].sort((a,b)=>scoreMap[b.id]-scoreMap[a.id]).slice(0,5);
  const rc = {High:'#ef4444',Med:'#eab308',Low:'#22c55e'};
  function hg(title,tasks,c) { return `<div class="mb-6"><h3 class="text-sm font-bold mb-3 flex items-center gap-2" style="color:${c}"><div class="w-2 h-2 rounded-full" style="background:${c}"></div>${title} Risk (${tasks.length})</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">${tasks.map(t=>`<div class="bg-dark-700/40 border border-white/5 rounded-lg p-3 card-hover cursor-pointer" onclick="openSidePanel('${t.id}','${t.projectId}')"><div class="flex items-center justify-between mb-1"><span class="text-xs font-semibold text-gray-200 truncate flex-1 pr-2">${t.title}</span><div class="w-2 h-2 rounded-full flex-shrink-0" style="background:${healthColor(t.health)}"></div></div><div class="text-[10px] text-gray-500 mb-1">${t.projectName}</div><div class="flex items-center justify-between"><span class="text-[10px] ${t.column==='Done'?'text-green-400':'text-gray-500'}">${t.column}</span><span class="text-[10px] text-gray-600">${t.due}</span></div></div>`).join('')}</div></div>`; }
  document.getElementById('heatmapView').innerHTML = `<div class="bg-dark-800/50 border border-white/5 rounded-2xl p-6"><h2 class="text-lg font-bold text-neon-cyan mb-2">Priority Heat Map</h2><p class="text-xs text-gray-500 mb-6">Tasks by composite priority score</p><div class="mb-6 p-4 rounded-xl bg-red-500/5 border border-red-500/20"><h3 class="text-sm font-bold text-red-400 mb-3">🔥 Top 5 Critical</h3><div class="space-y-2">${top5.map((t,i)=>`<div class="flex items-center gap-3 bg-dark-900/50 rounded-lg p-2.5 cursor-pointer hover:bg-dark-900/80 transition" onclick="openSidePanel('${t.id}','${t.projectId}')"><span class="text-xs font-bold text-red-400 w-5">#${i+1}</span><div class="flex-1 min-w-0"><div class="text-xs font-semibold text-gray-200 truncate">${t.title}</div><div class="text-[10px] text-gray-500">${t.projectName}</div></div><div class="w-2 h-2 rounded-full" style="background:${healthColor(t.health)}"></div><span class="text-[10px] px-1.5 py-0.5 rounded bg-red-500/20 text-red-300 border border-red-500/30">${scoreMap[t.id]}</span></div>`).join('')}</div></div>${riskOrder.map(r=>hg(r,allTasks.filter(t=>t.risk===r),rc[r])).join('')}</div>`;
}

// ============ DRAG & DROP ============
function handleDragStart(e, taskId, projId, column) { draggedTaskId=taskId; draggedFromProject=projId; draggedFromColumn=column; e.dataTransfer.effectAllowed='move'; e.target.classList.add('dragging'); }
function handleDragEnd(e) { e.target.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); draggedTaskId=null; draggedFromProject=null; draggedFromColumn=null; }
function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect='move'; const col=e.currentTarget.closest('[data-column]'); if(col&&!col.classList.contains('drag-over')){document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));col.classList.add('drag-over');} }
function handleDrop(e, targetColumn) { e.preventDefault(); document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); if(!draggedTaskId||!draggedFromProject)return; const proj=getProject(draggedFromProject); if(!proj)return; const task=proj.tasks.find(t=>t.id===draggedTaskId); if(task&&task.column!==targetColumn){task.column=targetColumn; renderAll();} }

        <div class="flex-1 bg-dark-900/50 rounded-lg p-2.5 border border-white/5">
          <div class="text-[10px] text-gray-500 mb-0.5">Risk</div>
          <span class="text-xs font-bold ${task.risk==='High'?'text-red-400':task.risk==='Med'?'text-yellow-400':'text-green-400'}">${task.risk}</span>
        </div>
        <div class="flex-1 bg-dark-900/50 rounded-lg p-2.5 border border-white/5">
          <div class="text-[10px] text-gray-500 mb-0.5">Revenue</div>
          <span class="text-xs font-bold text-neon-cyan">${task.revenue}</span>
        </div>
        <div class="flex-1 bg-dark-900/50 rounded-lg p-2.5 border border-white/5">
          <div class="text-[10px] text-gray-500 mb-0.5">Est. Complete</div>
          <span class="text-xs font-bold text-white">${task.due}</span>
        </div>
      </div>

      <!-- Column quick-move -->
      <div class="mt-4 flex gap-1">
        ${COLUMNS.map(col => `<button onclick="moveTask('${task.id}','${projId}','${col}')" class="flex-1 py-1.5 text-[9px] font-medium rounded-md transition ${task.column===col ? 'font-bold' : 'bg-dark-900/50 text-gray-600 hover:text-gray-300'}" style="${task.column===col ? 'background:'+COL_COLORS[col]+'22;color:'+COL_COLORS[col]+';border:1px solid '+COL_COLORS[col]+'44' : ''}">${col}</button>`).join('')}
      </div>
    </div>

    <!-- SECTION 2: AI INSIGHTS & UPDATES -->
    <div class="p-5 border-b border-white/5">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <div class="w-1 h-4 rounded bg-neon-purple"></div>
          <h3 class="text-xs font-bold text-gray-300 uppercase tracking-wider">AI Insights</h3>
        </div>
        <div class="flex items-center gap-1.5">
          <div class="w-1.5 h-1.5 rounded-full ${agent.status==='active'?'bg-green-500':'bg-gray-600'}"></div>
          <span class="text-[10px] text-gray-500">${agent.name} · ${agent.lastSeen}</span>
        </div>
      </div>

      <div class="space-y-2">
        ${agent.insights.map(ins => `
          <div class="insight-card rounded-lg p-3 bg-dark-900/30" style="border-left-color:${insightColor(ins.type)}">
            <div class="flex items-start gap-2">
              <span class="text-sm mt-0.5 flex-shrink-0">${insightIcon(ins.type)}</span>
              <div class="flex-1 min-w-0">
                <div class="text-[11px] text-gray-300 leading-relaxed">${ins.text}</div>
                <div class="flex items-center gap-2 mt-1.5">
                  <span class="text-[9px] px-1.5 py-0.5 rounded font-medium" style="background:${insightColor(ins.type)}15;color:${insightColor(ins.type)};border:1px solid ${insightColor(ins.type)}33">${ins.type}</span>
                  <span class="text-[9px] text-gray-600">${ins.time}</span>
                </div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- SECTION 3: DIRECT AGENT CHAT -->
    <div class="p-5 flex flex-col" style="min-height:300px">
      <div class="flex items-center gap-2 mb-3">
        <div class="w-1 h-4 rounded bg-neon-green"></div>
        <h3 class="text-xs font-bold text-gray-300 uppercase tracking-wider">Chat with ${agent.name}</h3>
      </div>

      <div id="chatMessages" class="flex-1 space-y-2.5 mb-3 overflow-y-auto max-h-[300px] pr-1">
        ${chat.length === 0 ? `<div class="text-center py-6"><span class="text-2xl mb-2 block">${agent.avatar}</span><p class="text-[11px] text-gray-600">Message ${agent.name} about this task</p></div>` : chat.map(m => `
          <div class="${m.role==='user'?'text-right':'text-left'}">
            <div class="inline-block max-w-[85%] px-3 py-2 rounded-xl text-[11px] leading-relaxed ${m.role==='user'?'bg-neon-cyan/10 text-gray-200 border border-neon-cyan/20':'bg-dark-900/60 text-gray-300 border border-white/5'}">
              ${m.text}
            </div>
          </div>
        `).join('')}
      </div>

      <div class="flex gap-2">
        <input id="chatInput" placeholder="Type a message..." class="flex-1 px-3 py-2 rounded-lg bg-dark-900 border border-white/10 text-white text-xs placeholder-gray-600 focus:border-neon-cyan/40 focus:outline-none" onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()" class="px-3 py-2 rounded-lg bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan text-xs font-medium hover:bg-neon-cyan/25 transition flex-shrink-0">Send</button>
      </div>
    </div>
  `;

  document.getElementById('sidePanel').classList.add('open');
  document.getElementById('sidePanelOverlay').classList.remove('hidden');

  // Scroll chat to bottom
  setTimeout(() => { const cm = document.getElementById('chatMessages'); if(cm) cm.scrollTop = cm.scrollHeight; }, 50);
}

function closeSidePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('sidePanelOverlay').classList.add('hidden');
  currentSidePanelTask = null;
  currentSidePanelProject = null;
}

function moveTask(taskId, projId, newColumn) {
  const proj = getProject(projId); if(!proj) return;
  const task = proj.tasks.find(t => t.id === taskId);
  if(task) { task.column = newColumn; renderAll(); openSidePanel(taskId, projId); }
}

function deleteTask(taskId, projId) {
  const proj = getProject(projId); if(!proj) return;
  proj.tasks = proj.tasks.filter(t => t.id !== taskId);
  closeSidePanel(); renderAll();
}

function sendChat() {
  const input = document.getElementById('chatInput');
  if(!input) return;
  const text = input.value.trim();
  if(!text || !currentSidePanelProject) return;

  if(!chatHistories[currentSidePanelProject]) chatHistories[currentSidePanelProject] = [];
  chatHistories[currentSidePanelProject].push({role:'user', text});

  input.value = '';

  // Re-render chat area
  const chatArea = document.getElementById('chatMessages');
  if(chatArea) {
    chatArea.innerHTML += `<div class="text-right"><div class="inline-block max-w-[85%] px-3 py-2 rounded-xl text-[11px] leading-relaxed bg-neon-cyan/10 text-gray-200 border border-neon-cyan/20">${text}</div></div>`;
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // Simulate agent typing + response
  setTimeout(() => {
    if(chatArea) {
      chatArea.innerHTML += `<div class="text-left" id="agentTyping"><div class="inline-block px-3 py-2 rounded-xl text-[11px] bg-dark-900/60 text-gray-300 border border-white/5"><span class="typing-dots"><span>.</span><span>.</span><span>.</span></span></div></div>`;
      chatArea.scrollTop = chatArea.scrollHeight;
    }
    setTimeout(() => {
      const agent = AGENT_DATA[currentSidePanelProject];
      const responses = [
        `Got it — I'll prioritize that alongside the current ${agent?.name || 'project'} workload. Should have an update within the hour.`,
        `Noted. I'm already tracking this area closely. Let me dig deeper and report back with specifics.`,
        `Good call. I'll adjust the approach and flag any blockers I hit. Anything else you want me to focus on?`,
        `Understood. I'll cross-reference this with the latest data and surface any risks before they escalate.`,
        `On it. I can see a path forward — let me verify a few things first and I'll ping you with the plan.`
      ];
      const resp = responses[Math.floor(Math.random() * responses.length)];
      chatHistories[currentSidePanelProject].push({role:'agent', text:resp});
      const typing = document.getElementById('agentTyping');
      if(typing) typing.remove();
      if(chatArea) {
        chatArea.innerHTML += `<div class="text-left"><div class="inline-block max-w-[85%] px-3 py-2 rounded-xl text-[11px] leading-relaxed bg-dark-900/60 text-gray-300 border border-white/5">${resp}</div></div>`;
        chatArea.scrollTop = chatArea.scrollHeight;
      }
    }, 1200 + Math.random() * 800);
  }, 400);
}

// ============ MODALS ============
function openAddProjectModal() { document.getElementById('addProjectModal').classList.add('active'); }
function closeAddProjectModal() { document.getElementById('addProjectModal').classList.remove('active'); document.getElementById('newProjName').value=''; document.getElementById('newProjDesc').value=''; }
function addProject() { const n=document.getElementById('newProjName').value.trim(); if(!n)return; const id='p'+(++nextId); projects.push({id,name:n,desc:document.getElementById('newProjDesc').value.trim()||'New project',stage:document.getElementById('newProjStage').value,timeline:false,tasks:[]}); AGENT_DATA[id]={name:n+' Agent',avatar:'🤖',status:'idle',lastSeen:'just now',insights:[]}; chatHistories[id]=[]; closeAddProjectModal(); currentProjectId=id; renderAll(); }
function openAddTaskModal(column) { document.getElementById('newTaskColumn').value=column; document.getElementById('addTaskModal').classList.add('active'); }
function closeAddTaskModal() { document.getElementById('addTaskModal').classList.remove('active'); document.getElementById('newTaskTitle').value=''; document.getElementById('newTaskDesc').value=''; }
function addTask() { const t=document.getElementById('newTaskTitle').value.trim(); if(!t)return; const proj=getCurrentProject(); if(!proj)return; proj.tasks.push({id:'t'+(++nextId),title:t,desc:document.getElementById('newTaskDesc').value.trim()||'New task',health:document.getElementById('newTaskHealth').value,due:document.getElementById('newTaskDue').value||'2026-06-15',risk:document.getElementById('newTaskRisk').value,revenue:document.getElementById('newTaskRevenue').value,column:document.getElementById('newTaskColumn').value}); closeAddTaskModal(); renderAll(); }

// ============ VIEW TOGGLE ============
function toggleView(view) {
  document.getElementById('kanbanView').classList.toggle('hidden', view!=='kanban');
  document.getElementById('ganttView').classList.toggle('hidden', view!=='gantt');
  document.getElementById('heatmapView').classList.toggle('hidden', view!=='heatmap');
  ['btnKanban','btnGantt','btnHeatmap'].forEach(id => { document.getElementById(id).className = 'px-3 py-2 rounded-lg text-sm font-medium bg-white/5 text-gray-400 border border-white/10 hover:bg-white/10'; });
  const btn = view==='kanban'?'btnKanban':view==='gantt'?'btnGantt':'btnHeatmap';
  document.getElementById(btn).className = 'px-3 py-2 rounded-lg text-sm font-medium bg-neon-cyan/10 text-neon-cyan border border-neon-cyan/30';
  if(view==='gantt') renderGantt(); if(view==='heatmap') renderHeatmap();
}

function selectProject(id) { currentProjectId=id; renderAll(); }
function renderAll() { renderSummary(); renderProjectTabs(); renderKanban(); }
renderAll();
</script>
</body>
</html>
